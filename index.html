<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kokokoOS</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;

  background-image: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
  background-size: cover;
  background-position: center;
}

/* OVERLAY */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.45);
  pointer-events: none;
}

/* DESKTOP */
#desktop {
  width: 100vw;
  height: calc(100vh - 45px);
  position: absolute;
}

/* ICONS */
.icon {
  width: 90px;
  height: 90px;
  background: rgba(0,0,0,0.25);
  color: white;
  border-radius: 10px;
  position: absolute;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(3px);
}

/* WINDOW */
.window {
  position: absolute;
  width: 350px;
  height: 250px;
  background: #1e1e1e;
  border: 1px solid #444;
  border-radius: 8px;
  overflow: hidden;
}

/* MAXIMIZED */
.window.maximized {
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: calc(100vh - 45px) !important;
  border-radius: 0;
}

/* TITLEBAR */
.titlebar {
  background: #111;
  color: white;
  padding: 6px;
  display: flex;
  justify-content: space-between;
  cursor: grab;
  font-size: 13px;
}

/* TASKBAR */
#taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 45px;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  padding: 0 10px;
  color: white;
  gap: 10px;
}

#taskapps {
  display: flex;
  gap: 6px;
}

.taskapp {
  background: #333;
  padding: 5px 8px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}

/* APPFLOW */
#appflow {
  padding: 10px;
  color: white;
  overflow-y: auto;
  height: 100%;
}

.card {
  background: #2a2a2a;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.card button {
  width: 100%;
  margin-top: 5px;
  padding: 5px;
  background: #444;
  border: none;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div id="overlay"></div>
<div id="desktop"></div>

<div id="taskbar">
  <button onclick="openAppflow()">Appflow</button>
  <div id="taskapps"></div>
</div>

<script>

/* ======================
   SISTEMA DE APPS
====================== */

const KEY = "kokoko_apps_v3";

function getApps() {
  return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function saveApps(apps) {
  localStorage.setItem(KEY, JSON.stringify(apps));
}

/* ======================
   DESKTOP
====================== */

function loadDesktop() {
  const desk = document.getElementById("desktop");
  desk.innerHTML = "";

  const apps = getApps();

  apps.forEach((app, i) => {
    const div = document.createElement("div");
    div.className = "icon";

    div.style.left = (20 + i * 110) + "px";
    div.style.top = "20px";

    div.innerHTML = app.name;

    div.onclick = () => openApp(app);

    desk.appendChild(div);
  });
}

/* ======================
   ABRIR APP
====================== */

let z = 10;

function openApp(app) {

  const win = document.createElement("div");
  win.className = "window";
  win.style.zIndex = ++z;

  win.style.left = "100px";
  win.style.top = "80px";

  win.innerHTML = `
    <div class="titlebar">
      <span>${app.name}</span>
      <div>
        <button onclick="toggleMaximize(this)">🗖</button>
        <button onclick="closeWindow(this)">X</button>
      </div>
    </div>
    <div style="padding:10px;color:white;">
      ${app.html}
    </div>
  `;

  document.body.appendChild(win);

  makeDraggable(win);
}

/* ======================
   FECHAR JANELA
====================== */

function closeWindow(btn) {
  btn.closest(".window").remove();
}

/* ======================
   MAXIMIZAR
====================== */

function toggleMaximize(btn) {
  const win = btn.closest(".window");

  if (win.classList.contains("maximized")) {
    win.classList.remove("maximized");

    win.style.width = win.dataset.w;
    win.style.height = win.dataset.h;
    win.style.left = win.dataset.x;
    win.style.top = win.dataset.y;

  } else {
    win.dataset.w = win.style.width;
    win.dataset.h = win.style.height;
    win.dataset.x = win.style.left;
    win.dataset.y = win.style.top;

    win.classList.add("maximized");
  }
}

/* ======================
   DRAG (ARRASTAR)
====================== */

function makeDraggable(win) {
  const bar = win.querySelector(".titlebar");

  let offsetX = 0;
  let offsetY = 0;
  let dragging = false;

  bar.addEventListener("mousedown", (e) => {
    if (win.classList.contains("maximized")) return;

    dragging = true;

    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
  });

  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;

    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top = (e.clientY - offsetY) + "px";
  });

  document.addEventListener("mouseup", () => {
    dragging = false;
  });
}

/* ======================
   APPFLOW
====================== */

function openAppflow() {

  const win = document.createElement("div");
  win.className = "window";
  win.style.zIndex = ++z;
  win.style.left = "120px";
  win.style.top = "80px";

  win.innerHTML = `
    <div class="titlebar">
      <span>Appflow</span>
      <div>
        <button onclick="toggleMaximize(this)">🗖</button>
        <button onclick="closeWindow(this)">X</button>
      </div>
    </div>

    <div id="appflow"></div>
  `;

  document.body.appendChild(win);

  renderStore();
  makeDraggable(win);
}

/* ======================
   LOJA
====================== */

function renderStore() {
  const container = document.getElementById("appflow");
  container.innerHTML = "";

  const apps = getApps();

  apps.forEach((app, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <b>${app.name}</b>

      <button onclick='openApp(${JSON.stringify(app)})'>Abrir</button>
      <button onclick='uninstall(${index})'>Desinstalar</button>
    `;

    container.appendChild(card);
  });

  const install = document.createElement("div");
  install.className = "card";
  install.innerHTML = `<button onclick="installApp()">Instalar App (.kok)</button>`;
  container.appendChild(install);
}

/* ======================
   INSTALAR
====================== */

function installApp() {
  const input = prompt("Cole o app JSON:");

  try {
    const app = JSON.parse(input);

    let apps = getApps();
    apps.push(app);

    saveApps(apps);
    loadDesktop();

  } catch {
    alert("App inválido");
  }
}

/* ======================
   DESINSTALAR
====================== */

function uninstall(index) {
  let apps = getApps();
  apps.splice(index, 1);
  saveApps(apps);
  loadDesktop();
  renderStore();
}

/* ======================
   INIT
====================== */

window.onload = () => {

  if (!localStorage.getItem(KEY)) {
    saveApps([
      {
        name: "Notas",
        html: "<textarea style='width:100%;height:200px'></textarea>"
      },
      {
        name: "Ajuda",
        html: "<h3>KokokoOS</h3><p>Sistema funcionando</p>"
      }
    ]);
  }

  loadDesktop();
};

</script>

</body>
</html>
