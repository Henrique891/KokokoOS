<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>KokokoOS Refactored</title>

<style>
:root{
  --bg1:#0b1220;
  --panel:#111827cc;
  --accent:#38bdf8;
  --text:#ffffff;
}

/* 🌌 BASE */
body{
  margin:0;
  font-family:Arial;
  background:var(--bg1);
  color:var(--text);
  overflow:hidden;
}

.dream{
  filter:brightness(1.3) saturate(0.75);
}

/* 🖥️ DESKTOP */
#desktop{
  width:100%;
  height:100vh;
  position:relative;
}

/* 📊 UI PANEL */
#ui{
  position:absolute;
  top:10px;
  left:10px;
  background:var(--panel);
  padding:12px;
  border-radius:10px;
  font-size:14px;
  min-width:160px;
}

/* BOTÕES */
.btn{
  margin-top:6px;
  padding:6px;
  background:#1f2937;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  background:#374151;
}

/* 🧠 PETS */
.pet{
  position:absolute;
  bottom:40px;
  font-size:55px;
  cursor:pointer;
  user-select:none;
}

#dog{ left:40px; }
#cat{ left:120px; }
#dreamBtn{ left:200px; }

/* 👾 BOSS */
.boss{
  position:absolute;
  font-size:60px;
  cursor:pointer;
  user-select:none;
}

/* 🦠 VIRUS */
.virus{
  position:absolute;
  font-size:24px;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="desktop">

  <!-- UI -->
  <div id="ui">
    ⭐ XP: <span id="xp">0</span><br>
    🪙 Coins: <span id="coins">0</span><br>
    👾 Boss HP: <span id="hp">0</span><br>

    <div class="btn" onclick="Game.spawnBoss()">Spawn Boss</div>
    <div class="btn" onclick="Game.toggleDream()">Dream Mode</div>
  </div>

  <!-- PETS -->
  <div class="pet" id="dog" onclick="Pets.dog.attack()">🐶</div>
  <div class="pet" id="cat" onclick="Pets.cat.attack()">🐱</div>
  <div class="pet" id="dreamBtn" onclick="Game.toggleDream()">🛏️</div>

</div>

<script>

/* =========================
   🧠 GAME ENGINE (STATE)
========================= */

const Game = {

  state:{
    xp:0,
    coins:0,
    dream:false,
    boss:null,
    dreamLoop:null
  },

  addXP(v){
    this.state.xp += v;
    UI.update();
  },

  addCoins(v){
    this.state.coins += v;
    UI.update();
  },

  /* ================= BOSS ================= */

  spawnBoss(){

    if(this.state.boss) return;

    const el = document.createElement("div");
    el.className = "boss";
    el.innerHTML = "🦠 BOSS";

    el.style.left = "60%";
    el.style.top = "30%";

    el.onclick = () => this.damageBoss(2);

    document.body.appendChild(el);

    this.state.boss = {
      hp:30,
      el:el
    };

    UI.update();
  },

  damageBoss(dmg){

    const boss = this.state.boss;
    if(!boss) return;

    boss.hp -= dmg;
    this.addXP(5);

    if(boss.hp <= 0){

      boss.el.remove();
      this.state.boss = null;

      this.addXP(100);
      this.addCoins(50);

      alert("💥 BOSS DERROTADO!");
    }

    UI.update();
  },

  /* ================= DREAM MODE ================= */

  toggleDream(){

    this.state.dream = !this.state.dream;
    document.body.classList.toggle("dream");

    alert("🌙 Dream: " + this.state.dream);

    if(this.state.dream){

      clearInterval(this.state.dreamLoop);

      this.state.dreamLoop = setInterval(()=>{

        if(this.state.boss){
          this.damageBoss(1);
        }

      },3000);

    } else {
      clearInterval(this.state.dreamLoop);
    }
  }
};

/* =========================
   🐾 PET SYSTEM
========================= */

const Pets = {

  dog:{
    level:1,

    attack(){
      if(Game.state.boss){
        Game.damageBoss(this.level);
        this.levelUp();
      }
    },

    levelUp(){
      if(Game.state.xp > this.level * 20){
        this.level++;
        alert("🐶 Dog Lv " + this.level);
      }
    }
  },

  cat:{
    level:1,

    attack(){
      if(Game.state.boss){
        Game.damageBoss(this.level * 2);
        this.levelUp();
      }
    },

    levelUp(){
      if(Game.state.xp > this.level * 25){
        this.level++;
        alert("🐱 Cat Lv " + this.level);
      }
    }
  }
};

/* =========================
   🎨 UI SYSTEM
========================= */

const UI = {

  update(){
    document.getElementById("xp").innerText = Game.state.xp;
    document.getElementById("coins").innerText = Game.state.coins;
    document.getElementById("hp").innerText =
      Game.state.boss ? Game.state.boss.hp : 0;
  }
};

/* =========================
   LOOP (SAFE SPAWN)
========================= */

setInterval(()=>{

  if(!Game.state.boss && Math.random() < 0.25){
    Game.spawnBoss();
  }

},5000);

/* INIT */
UI.update();

</script>

</body>
</html>
